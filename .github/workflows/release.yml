name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          sparse-checkout: Cargo.toml
      - name: Check version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{s/^version *= *"\(.*\)"/\1/p}' Cargo.toml)
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi

  wheels:
    name: Wheel ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: [validate, ci]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate, ci]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sdist
          path: dist/*.tar.gz

  cli:
    name: CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: [validate, ci]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: cli-${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2.68.16
        with:
          tool: cross
      - name: Build
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --package despina-cli --target ${{ matrix.target }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGING="despina-${VERSION}-${{ matrix.target }}"
          mkdir -p dist "${STAGING}"
          cp "target/${{ matrix.target }}/release/despina" "${STAGING}/"
          cp LICENSE-MIT LICENSE-APACHE "${STAGING}/"
          tar czf "dist/${STAGING}.tar.gz" -C . "${STAGING}"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = "$env:GITHUB_REF_NAME"
          $Staging = "despina-${Version}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $Staging
          Copy-Item "target/${{ matrix.target }}/release/despina.exe" -Destination $Staging
          Copy-Item "LICENSE-MIT","LICENSE-APACHE" -Destination $Staging
          New-Item -ItemType Directory -Path dist -Force
          Compress-Archive -Path "${Staging}/*" -DestinationPath "dist/${Staging}.zip"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-${{ matrix.target }}
          path: dist/*

  duckdb:
    name: DuckDB ${{ matrix.duckdb_platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: [validate, ci]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            duckdb_platform: linux_amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            duckdb_platform: linux_arm64
          - os: macos-14
            target: aarch64-apple-darwin
            duckdb_platform: osx_arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            duckdb_platform: windows_amd64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: duckdb-${{ matrix.target }}
      - name: Install cargo-duckdb-ext-tools
        run: cargo install cargo-duckdb-ext-tools@0.5.0 --locked
      - name: Build extension
        run: cargo duckdb-ext build -m crates/despina-duckdb/Cargo.toml -- -p despina-duckdb --no-default-features --features loadable --release
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          EXT_FILE=$(find target/release -name '*.duckdb_extension' | head -1)
          if [ -z "${EXT_FILE}" ]; then
            echo "::error::No .duckdb_extension file found in target/release"
            exit 1
          fi
          mkdir -p dist
          gzip -c "${EXT_FILE}" > "dist/despina-duckdb-${VERSION}-${{ matrix.duckdb_platform }}.duckdb_extension.gz"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = "$env:GITHUB_REF_NAME"
          $ExtFile = Get-ChildItem -Path target/release -Filter *.duckdb_extension -Recurse | Select-Object -First 1
          if (-not $ExtFile) {
              Write-Error "No .duckdb_extension file found in target/release"
              exit 1
          }
          New-Item -ItemType Directory -Path dist -Force
          $inBytes = [System.IO.File]::ReadAllBytes($ExtFile.FullName)
          $outPath = "dist/despina-duckdb-${Version}-${{ matrix.duckdb_platform }}.duckdb_extension.gz"
          $outStream = [System.IO.File]::Create($outPath)
          $gzip = New-Object System.IO.Compression.GZipStream($outStream, [System.IO.Compression.CompressionMode]::Compress)
          $gzip.Write($inBytes, 0, $inBytes.Length)
          $gzip.Close()
          $outStream.Close()
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: duckdb-${{ matrix.duckdb_platform }}
          path: dist/*

  wasm:
    name: WASM package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate, ci]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: wasm
      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2.0.0
      - name: Build
        run: just -f crates/despina-wasm/justfile build
      - name: Copy README
        run: cp crates/despina-wasm/README.md target/wasm-pkg/README.md
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wasm-pkg
          path: target/wasm-pkg/

  build-gate:
    name: All builds passed
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [wheels, sdist, cli, duckdb, wasm]
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
      - run: echo "All build artefacts produced successfully."

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-gate]
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/

  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-gate]
    environment: release
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: wasm-pkg
          path: pkg
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish --access public
        working-directory: pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-gate]
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: publish
      - name: Publish despina
        run: cargo publish -p despina
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish despina-cli
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo publish -p despina-cli; then
              exit 0
            fi
            echo "Attempt ${attempt}/5 failed, waiting 30s before retry..."
            sleep 30
          done
          echo "::error::Failed to publish despina-cli after 5 attempts"
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  deploy-duckdb:
    name: Deploy DuckDB extensions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-gate]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          sparse-checkout: crates/despina-duckdb/Cargo.toml
      - name: Determine DuckDB version
        id: duckdb-version
        run: |
          version=$(sed -n 's/^duckdb = { version = "=\([^"]*\)".*/\1/p' crates/despina-duckdb/Cargo.toml)
          if [ -z "$version" ]; then
            echo "::error::Failed to parse DuckDB version from Cargo.toml"
            exit 1
          fi
          echo "version=v${version}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          pattern: duckdb-*
      - name: Arrange extension files
        run: |
          DUCKDB_VERSION="${{ steps.duckdb-version.outputs.version }}"
          VERSION="${GITHUB_REF_NAME}"
          for platform in linux_amd64 linux_arm64 osx_arm64 windows_amd64; do
            mkdir -p "site/${DUCKDB_VERSION}/${platform}"
            cp "artifacts/duckdb-${platform}/despina-duckdb-${VERSION}-${platform}.duckdb_extension.gz" \
               "site/${DUCKDB_VERSION}/${platform}/despina.duckdb_extension.gz"
          done
      - uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [cli, crates-io, publish, npm-publish, deploy-duckdb]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          pattern: cli-*
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          pattern: duckdb-*
          merge-multiple: true
      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: false
          files: dist/*
